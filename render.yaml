services:
  - type: web
    name: shift-schedule
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
